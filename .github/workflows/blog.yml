name: Blog Auto Publish

on:
  schedule:
    # Every day at 09:00 Beijing time = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow

      - name: Run blog runner
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          D1_API_URL: ${{ secrets.D1_API_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
        run: |
          python .blog-ops/scripts/blog_runner.py
