name: Blog Auto Publish

on:
  schedule:
    # Every day at 08:00 Beijing time = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish regardless of rhythm check'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install Pillow

      - name: Run blog runner
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          D1_API_URL: ${{ secrets.D1_API_URL }}
          D1_API_KEY: ${{ secrets.D1_API_KEY }}
          CF_IMAGE_ACCOUNT_ID: ${{ secrets.CF_IMAGE_ACCOUNT_ID }}
          CF_IMAGE_API_TOKEN: ${{ secrets.CF_IMAGE_API_TOKEN }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python .blog-ops/scripts/blog_runner.py $FORCE_FLAG
